name: Sync Fork with Upstream

on:
  schedule:
    # 每天 UTC 0 点（北京时间 8 点）自动同步
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository.fork }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          # 原仓库：Threekiii/Awesome-Redteam
          upstream_sync_repo: Threekiii/Awesome-Redteam
          # 原仓库分支是 master（根据截图确认）
          upstream_sync_branch: master
          # 你的 Fork 仓库分支也设为 master（保持一致）
          target_sync_branch: master
          test_mode: false
